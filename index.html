<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Dallas Overture Places + Zoning</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/pmtiles/dist/pmtiles.js"></script>
<style>
  body { margin: 0; }
  #map { width: 100%; height: 100vh; }
  #legend {
    position: absolute;
    bottom: 30px;
    left: 10px;
    background: white;
    padding: 10px 14px;
    border-radius: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    font: 13px/1.6 sans-serif;
    z-index: 1;
  }
  #legend h4 { margin: 0 0 6px; font-size: 13px; }
  #legend div { display: flex; align-items: center; gap: 6px; }
  #legend span {
    width: 12px; height: 12px; border-radius: 50%; display: inline-block; flex-shrink: 0;
  }
</style>
</head>
<body>
<div id="map"></div>
<div id="legend">
  <h4>Zoning Type</h4>
  <div><span style="background:#3b82f6"></span>Residential</div>
  <div><span style="background:#ef4444"></span>Commercial</div>
  <div><span style="background:#a855f7"></span>Industrial</div>
  <div><span style="background:#f97316"></span>Mixed</div>
  <div><span style="background:#14b8a6"></span>Planned</div>
  <div><span style="background:#22c55e"></span>Agriculture</div>
  <div><span style="background:#eab308"></span>Overlay</div>
  <div><span style="background:#ec4899"></span>Special</div>
  <div><span style="background:#94a3b8"></span>No zoning</div>
  <a href="https://github.com/bdon/overture-gers-tiles-example" target="_blank" style="display:block;margin-top:8px;font-size:12px;color:#64748b">GitHub</a>
</div>
<script>
  const protocol = new pmtiles.Protocol();
  maplibregl.addProtocol("pmtiles", protocol.tile);

  const map = new maplibregl.Map({
    container: "map",
    style: {
      version: 8,
      sources: {
        carto: {
          type: "raster",
          tiles: ["https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}@2x.png"],
          tileSize: 256,
          attribution: "&copy; <a href='https://carto.com/attributions'>CARTO</a> &copy; <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a> &copy; <a href='https://docs.overturemaps.org/attribution'>Overture Maps Foundation</a> &copy; <a href='https://regrid.com'>Regrid</a>"
        },
        dallas: {
          type: "vector",
          url: "pmtiles://dallas.pmtiles"
        }
      },
      layers: [
        { id: "basemap", type: "raster", source: "carto" },
        {
          id: "places-circle",
          type: "circle",
          source: "dallas",
          "source-layer": "features",
          paint: {
            "circle-radius": ["interpolate", ["linear"], ["zoom"], 10, 1.5, 14, 4],
            "circle-color": [
              "match", ["get", "zoning_type"],
              "Residential", "#3b82f6",
              "Commercial",  "#ef4444",
              "Industrial",  "#a855f7",
              "Mixed",       "#f97316",
              "Planned",     "#14b8a6",
              "Agriculture", "#22c55e",
              "Overlay",     "#eab308",
              "Special",     "#ec4899",
              "#94a3b8"
            ],
            "circle-opacity": 0.8
          }
        },
        {
          id: "places-label",
          type: "symbol",
          source: "dallas",
          "source-layer": "features",
          minzoom: 13,
          layout: {
            "text-field": ["get", "@name"],
            "text-size": 11,
            "text-offset": [0, 1.2],
            "text-anchor": "top",
            "text-optional": true
          },
          paint: {
            "text-color": "#1e293b",
            "text-halo-color": "#ffffff",
            "text-halo-width": 1.5
          }
        }
      ]
    },
    center: [-96.806, 32.836],
    zoom: 12,
    minZoom: 10
  });

  const popup = new maplibregl.Popup({ closeButton: false, closeOnClick: false });

  map.on("mousemove", "places-circle", (e) => {
    map.getCanvas().style.cursor = "pointer";
    const f = e.features[0];
    const p = f.properties;
    const rows = [
      ["Name", p["@name"]],
      ["Confidence", p["confidence"] != null ? Number(p["confidence"]).toFixed(2) : null],
      ["GERS ID", p["gers_id"]],
      ["Regrid Parcel ID", p["ll_uuid"]],
      ["Regrid Zoning Type/Subtype", [p["zoning_type"], p["zoning_subtype"]].filter(Boolean).join(" / ")]
    ];
    const html = rows
      .filter(([, v]) => v)
      .map(([k, v]) => `<strong>${k}:</strong> ${v}`)
      .join("<br>");
    popup.setLngLat(e.lngLat).setHTML(html || "<em>No data</em>").addTo(map);
  });

  map.on("mouseleave", "places-circle", () => {
    map.getCanvas().style.cursor = "";
    popup.remove();
  });
</script>
</body>
</html>
